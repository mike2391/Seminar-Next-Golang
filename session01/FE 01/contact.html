<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
</head>

<body style="width: 80%; margin: 0 auto;">
    <header>
        <nav>
            <a href="index.html">Home</a> |
            <a href="contact.html">Contact</a> |
            <a href="profile.html">Profile</a> |
            <a href="about.html">About</a> |
        </nav>
    </header>
    <hr>

    <main>
        <fieldset>
            <legend>Contact</legend>
            <form action="">
                <div>
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name">
                </div>
                <br>
                <div>
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email">
                </div>
                <br>
                <div>
                    <label for="phone">Phone</label>
                    <input type="text" id="phone" name="phone">
                </div>
                <br>
                <div>
                    <label for="city">City</label>
                    <select name="city" id="city">
                        <option value="">Select City</option>
                        <option value="jakarta">Jakarta</option>
                        <option value="bandung">Bandung</option>
                        <option value="surabaya">Surabaya</option>
                        <option value="surabaya">Jambi</option>
                        <option value="surabaya">Bandung</option>
                        <option value="surabaya">Tasikmalaya</option>
                        <option value="surabaya">Depok</option>
                        <option value="surabaya">Bekasi</option>
                        <option value="surabaya">Yogya</option>
                        <option value="surabaya">Suakarta</option>
                        <option value="surabaya">Malang</option>
                    </select>
                </div>
                <br>
                <div>
                    <label for="gender">Gender</label>
                    <input type="radio" id="male" name="gender" value="male">
                    <label for="male">Male</label>
                    <input type="radio" id="female" name="gender" value="female">
                    <label for="female">Female</label>
                </div>
                <br>
                <div>
                    <label for="hobbies">Interest?</label>
                    <input type="checkbox" id="yes" name="hobbies" value="yes">
                    <label for="yes">Yes</label>
                </div>
                <br>
                <div>
                    <div>
                        <label for="message">Message</label>
                    </div>
                    <textarea id="message" name="message" cols="30" rows="10" draggable="false"></textarea>
                </div>
                <br>
                <input type="reset" value="reset">
                <input type="submit" value="Submit">
            </form>
        </fieldset>
    </main>
    <hr>
    <footer>
        <p style="text-align: center;"> Copyright &copy; 2026 Michael Valdio Setiawan </p>
    </footer>
</body>

</html>
