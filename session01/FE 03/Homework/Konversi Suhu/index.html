<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="wrapper">
        <div class="wrapper-suhu">
            <label for="suhu1">Suhu</label>
            <input name="suhu1" id="suhu1" type="number" oninput="konversiSuhu()">
            <label for="suhu-awal">suhu awal</label>
            <select id="suhu-awal" onchange="konversiSuhu()">
                <option value="celcius">Celcius</option>
                <option value="fahrenheit">Fahrenheit</option>
                <option value="kelvin">Kelvin</option>
                <option value="reamur">Reamur</option>
            </select>
        </div>
        <br>
        <div class="wrapper-suhu">
            <label for="suhu2">Suhu</label>
            <input name="suhu2" id="suhu2" type="number" disabled>
            <label for="konversi">konversi</label>
            <select id="konversi" onchange="konversiSuhu()">
                <option value="celcius">Celcius</option>
                <option value="fahrenheit">Fahrenheit</option>
                <option value="kelvin">Kelvin</option>
                <option value="reamur">Reamur</option>
            </select>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
