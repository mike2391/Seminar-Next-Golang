<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>

<body>
    <form>
        <input type="number" name="num1" id="num1" value="0" placeholder="First number">
        <input type="number" name="num2" id="num2" value="0" placeholder="Second number">
        <button type="button" onclick="add()">+</button>
        <button type="button" onclick="sub()">-</button>
        <button type="button" onclick="mul()">*</button>
        <button type="button" onclick="div()">/</button>
    </form>
    <div id="result" style="font-size: 30px; color: blue;">0</div>
    <script>


        function add() {
            let num1 = document.getElementById("num1").value
            let num2 = document.getElementById("num2").value
            let result = Number(num1) + Number(num2)
            document.getElementById("result").innerHTML = result
        }
        function sub() {
            let num1 = document.getElementById("num1").value
            let num2 = document.getElementById("num2").value
            let result = Number(num1) - Number(num2)
            document.getElementById("result").innerHTML = result
        }
        function mul() {
            let num1 = document.getElementById("num1").value
            let num2 = document.getElementById("num2").value
            let result = Number(num1) * Number(num2)
            document.getElementById("result").innerHTML = result
        }
        function div() {
            let num1 = document.getElementById("num1").value
            let num2 = document.getElementById("num2").value
            let result = Number(num1) / Number(num2)
            document.getElementById("result").innerHTML = result
        }
    </script>
</body>

</html>
