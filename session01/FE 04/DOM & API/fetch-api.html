<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Fetch API Example</h1>
    <!-- <button onclick="fetchData()">Fetch User Data</button> -->
    <ul id="user-list"></ul>
    <script>
        // consume , get data dari Endpoint API

        // Promise, fetch itu menggunakan Promise, jadi kita bisa menggunakan then untuk menangani hasilnya
        // then itu berhasil 
        // catch itu untuk menangani error jika terjadi kesalahan saat mengambil data
        // fetch("https://jsonplaceholder.typicode.com/users")
        //     .then(response => response.json()) // bentuk data yang kita dapatkan dari API itu masih dalam bentuk string,
        //     //  jadi kita perlu mengubahnya menjadi objek JavaScript dengan menggunakan response.json()
        //     .then(data => console.log(data))
        //     .catch(error => console.error("Error fetching data:", error));

        // async await, cara yang lebih modern untuk menangani Promise, membuat kode lebih mudah dibaca dan dipahami
        // definition function 
        async function fetchData() {
            try {
                const response = await fetch("https://jsonplaceholder.typicode.com/users");
                const data = await response.json();

                const userList = document.getElementById("user-list"); // selector untuk mengambil elemen dengan id user-list
                data.forEach(user => {
                    const listItem = document.createElement("li"); // membuat element li di dalam ul dengan id user-list
                    listItem.textContent = user.name; // menampilkan nama pengguna
                    userList.appendChild(listItem);// memassukkan semua element list ListItem ke dalam userlist
                });
            }
            catch (error) {
                console.error("Error fetching data:", error);
            }
        }

        fetchData()
    </script>
    <script>
        localStorage.setItem("name", "John Doe");
        const name = localStorage.getItem("name");
        localStorage.setItem("age", 30);
        localStorage.setItem("isMarried", true);
        localStorage.setItem("arr", [1, 2, 3, 4, 5])
        localStorage.setItem("obj", JSON.stringify({ name: "John Doe", age: 30, isMarried: true }))
        console.log(JSON.parse(localStorage.getItem("obj")))

    </script>
</body>

</html>
